name: barangay_bulletin
description: An Offline-First Community Reporting & Announcements App
publish_to: 'none'
version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3           # Core Hive database package
  hive_flutter: ^1.1.0   # Flutter-specific Hive extensions
  uuid: ^4.3.3           # Required for UUID v4 ID generation
  intl: ^0.19.0          # Date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1 # Generates TypeAdapter classes
  build_runner: ^2.4.9   # Runs the code generators
  flutter_lints: ^4.0.0
 
flutter:
  uses-material-design: true